permissions:
  contents: write

name: Updates image with quotes
# Controls when the workflow will run
on:
  schedule:
    - cron: "0 0 * * *"
  # Triggers the workflow on push or pull request events but only for the "main" branch
  # push:
    # branches: [ "main" ]
  # pull_request:
    # branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  update-image:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow requests

      # run script
      - name: Update the image
        run: python update-image.py --api-url "${{ secrets.API_ENDPOINT }}" --key "${{ secrets.API_KEY }}" --command "${{ secrets.API_COMMAND }}" --model "${{ secrets.API_MODEL }}"

      # Runs a set of commands using the runners shell
      - name: Upload to GitHub
        run: |
          git config user.email "actions@github.com"
          git config user.name "image-updater"
          git add quote.png
          git commit -m "actions: image update" || echo "No changes"
          git push
